server {
  listen 80;
  server_name _;

  root  /usr/share/nginx/html;
  index index.html;

  # ── SPA fallback ─────────────────────────────────────────────────────────────
  # All routes not matched below fall back to index.html so React Router works.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # ── API proxy → Spring Boot backend ──────────────────────────────────────────
  # Root cause for SSE breakage: nginx by default buffers upstream responses.
  # SSE requires an unbuffered, persistent HTTP/1.1 connection.
  # Without these headers:
  #   proxy_http_version 1.1  → nginx uses HTTP/1.0 which closes after each response
  #   proxy_set_header Connection ''  → removes the "close" header; keeps connection alive
  #   proxy_cache off / proxy_buffering off  → disables response buffering for SSE
  location /api {
    proxy_pass         http://backend:8080;

    # Required for SSE (Server-Sent Events) to work through nginx
    proxy_http_version 1.1;
    proxy_set_header   Connection        '';
    proxy_buffering    off;
    proxy_cache        off;

    # Forward real client information to Spring Boot
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;

    # Long timeout for SSE streams (5 minutes)
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    # Increase buffer sizes slightly for large JSON verdict payloads
    proxy_buffer_size        16k;
    proxy_buffers            4 32k;
    proxy_busy_buffers_size  64k;
  }

  # ── Actuator passthrough (health checks from external monitors) ───────────────
  location /actuator {
    proxy_pass         http://backend:8080;
    proxy_http_version 1.1;
    proxy_set_header   Connection        '';
    proxy_set_header   Host              $host;
  }

  # ── Static asset caching ──────────────────────────────────────────────────────
  # Vite generates hashed filenames (main.a1b2c3.js), so they can be cached forever.
  location ~* \.(js|css|woff2?|png|svg|ico|webp)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # ── Security headers ──────────────────────────────────────────────────────────
  add_header X-Content-Type-Options  "nosniff"        always;
  add_header X-Frame-Options         "DENY"           always;
  add_header Referrer-Policy         "same-origin"    always;

  # ── Gzip compression ─────────────────────────────────────────────────────────
  gzip on;
  gzip_types text/html text/css application/javascript application/json;
  gzip_min_length 1024;
}
