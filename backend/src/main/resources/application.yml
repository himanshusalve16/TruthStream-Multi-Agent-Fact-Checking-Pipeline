spring:
  application:
    # This name appears in the Eureka dashboard as the service ID.
    name: truthstream-gateway

  datasource:
    # These must be provided via environment variables. There is NO localhost fallback —
    # if the env var is missing, the app fails immediately with a clear error rather than
    # silently connecting to a local Postgres (which may not have the right schema).
    url:      ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size:     10
      minimum-idle:          2
      connection-timeout:    30000
      # ──────────────────────────────────────────────────────────────────────
      # initializationFailTimeout = -1 tells Hikari to retry connecting until
      # connection-timeout expires, rather than failing immediately on startup.
      #
      # Root cause this solves: Docker Compose's service_healthy for the db
      # service fires when pg_isready returns OK. pg_isready only checks that
      # Postgres is accepting TCP connections — it does NOT guarantee that:
      #   • The specific database (truthstream) exists
      #   • Flyway has finished applying migrations
      #   • The connection pool can actually establish a JDBC connection
      #
      # Without this setting, if Hikari's first connection attempt fails, the
      # Spring Boot context fails to start and the container exits.
      # With -1, Hikari keeps retrying for up to connection-timeout ms.
      # ──────────────────────────────────────────────────────────────────────
      initialization-fail-timeout: -1
      keepalive-time:        60000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  flyway:
    enabled:           true
    locations:         classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
    # Connect-retries: Flyway will retry the DB connection this many times
    # before giving up. Combined with Hikari's initialization-fail-timeout,
    # this makes Flyway resilient to the DB not being 100% ready at the
    # exact moment Spring Boot starts.
    connect-retries:   5

  data:
    redis:
      host:    ${SPRING_DATA_REDIS_HOST}
      port:    ${SPRING_DATA_REDIS_PORT}
      timeout: 5000ms
      repositories:
        enabled: false
      lettuce:
        pool:
          max-active: 8
          max-idle:   8
          min-idle:   1

  mvc:
    async:
      request-timeout: 300000

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

  servlet:
    multipart:
      max-request-size: 1MB
      max-file-size:    1MB

server:
  port: ${PORT:8080}
  compression:
    enabled: true

app:
  jwt:
    secret:    ${JWT_SECRET}
    expiry-ms: ${JWT_EXPIRY_MS:3600000}
  fastapi:
    base-url:        ${FASTAPI_BASE_URL}
    timeout-seconds: 30
  internal:
    api-secret: ${INTERNAL_API_SECRET}
  rate-limit:
    enabled: ${RATE_LIMIT_ENABLED:false}
    max-jobs-per-hour: 10
    max-auth-per-hour: 20

# ── Eureka Service Discovery ───────────────────────────────────────────────────
# Set EUREKA_CLIENT_SERVICEURL_DEFAULTZONE to point at the deployed registry,
# e.g. https://truthstream-eureka.onrender.com/eureka/
# Leave unset or set EUREKA_CLIENT_ENABLED=false to disable (static URL only).
eureka:
  client:
    enabled: ${EUREKA_CLIENT_ENABLED:true}
    register-with-eureka: ${EUREKA_CLIENT_ENABLED:true}
    fetch-registry: ${EUREKA_CLIENT_ENABLED:true}
    service-url:
      # Injected at runtime. In Docker Compose: http://eureka-server:8761/eureka/
      # On Render: https://truthstream-eureka.onrender.com/eureka/
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://eureka-server:8761/eureka/}
    # How often (ms) the client fetches the registry from the server.
    # 15s is a reasonable balance between freshness and load on free tier.
    registry-fetch-interval-seconds: 15
  instance:
    # ── Render instance hostname ────────────────────────────────────────────
    # RENDER_EXTERNAL_HOSTNAME is injected by Render automatically.
    # In Docker Compose this falls back to spring.application.name.
    hostname: ${RENDER_EXTERNAL_HOSTNAME:${spring.application.name}}
    # Use the injected hostname (not resolved IP) so the Eureka dashboard
    # shows the correct public Render URL for this service.
    prefer-ip-address: false
    # ── Heartbeat / lease tuning for Render free tier ───────────────────────
    # Heartbeat sent every 30s (default). Eureka server keeps instance alive
    # if a heartbeat arrives within lease-expiration-duration-in-seconds.
    lease-renewal-interval-in-seconds: 30
    # If no heartbeat arrives within 90s, Eureka considers the instance DOWN.
    # 3× the renewal interval is the recommended ratio.
    lease-expiration-duration-in-seconds: 90
    # Health check URL uses /actuator/health so Eureka can confirm UP status.
    health-check-url-path: /actuator/health
    status-page-url-path: /actuator/info
    # Metadata visible in the Eureka dashboard under instance details.
    metadata-map:
      service-type: gateway
      version: "1.0"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.truthstream:               DEBUG
    org.springframework.security:  INFO
    org.springframework.web:       INFO
    com.zaxxer.hikari:             WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
