spring:
  application:
    # This name appears in the Eureka dashboard as the service ID.
    name: truthstream-gateway

  datasource:
    # These must be provided via environment variables. There is NO localhost fallback —
    # if the env var is missing, the app fails immediately with a clear error rather than
    # silently connecting to a local Postgres (which may not have the right schema).
    url:      ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size:     10
      minimum-idle:          2
      connection-timeout:    30000
      # ──────────────────────────────────────────────────────────────────────
      # initializationFailTimeout = -1 tells Hikari to retry connecting until
      # connection-timeout expires, rather than failing immediately on startup.
      #
      # Root cause this solves: Docker Compose's service_healthy for the db
      # service fires when pg_isready returns OK. pg_isready only checks that
      # Postgres is accepting TCP connections — it does NOT guarantee that:
      #   • The specific database (truthstream) exists
      #   • Flyway has finished applying migrations
      #   • The connection pool can actually establish a JDBC connection
      #
      # Without this setting, if Hikari's first connection attempt fails, the
      # Spring Boot context fails to start and the container exits.
      # With -1, Hikari keeps retrying for up to connection-timeout ms.
      # ──────────────────────────────────────────────────────────────────────
      initialization-fail-timeout: -1
      keepalive-time:        60000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  flyway:
    enabled:           true
    locations:         classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
    # Connect-retries: Flyway will retry the DB connection this many times
    # before giving up. Combined with Hikari's initialization-fail-timeout,
    # this makes Flyway resilient to the DB not being 100% ready at the
    # exact moment Spring Boot starts.
    connect-retries:   5

  data:
    redis:
      host:    ${SPRING_DATA_REDIS_HOST}
      port:    ${SPRING_DATA_REDIS_PORT}
      timeout: 5000ms
      repositories:
        enabled: false
      lettuce:
        pool:
          max-active: 8
          max-idle:   8
          min-idle:   1

  mvc:
    async:
      request-timeout: 300000

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

  servlet:
    multipart:
      max-request-size: 1MB
      max-file-size:    1MB

server:
  port: ${PORT:8080}
  compression:
    enabled: true

app:
  jwt:
    secret:    ${JWT_SECRET}
    expiry-ms: ${JWT_EXPIRY_MS:3600000}
  fastapi:
    base-url:        ${FASTAPI_BASE_URL}
    timeout-seconds: 30
  internal:
    api-secret: ${INTERNAL_API_SECRET}
  rate-limit:
    enabled: ${RATE_LIMIT_ENABLED:false}
    max-jobs-per-hour: 10
    max-auth-per-hour: 20

# ── Eureka Service Discovery ───────────────────────────────────────────────────
# CRITICAL: The defaultZone URL MUST end with /eureka/ (trailing slash included).
# Example: https://truthstream-eureka.onrender.com/eureka/
# Missing /eureka/ causes "registration status: 404" — the Eureka server only
# serves registration endpoints under the /eureka/ path prefix.
#
# Set EUREKA_CLIENT_ENABLED=false to skip Eureka and use FASTAPI_BASE_URL only.
eureka:
  client:
    enabled: ${EUREKA_CLIENT_ENABLED:true}
    # register-with-eureka and fetch-registry must be plain `true` here.
    # Spring Cloud automatically suppresses them when `enabled: false`.
    # DO NOT couple these to EUREKA_CLIENT_ENABLED — that causes string-coercion
    # issues and unpredictable behavior when the env var is not set.
    register-with-eureka: true
    fetch-registry: true
    service-url:
      # IMPORTANT: Must include /eureka/ suffix with trailing slash.
      # Docker Compose: http://eureka-server:8761/eureka/
      # Render production: https://truthstream-eureka.onrender.com/eureka/
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://eureka-server:8761/eureka/}
    # How often the client fetches the full registry from the server.
    registry-fetch-interval-seconds: 15
    # Faster initial fetch so discovery is populated before first job dispatch.
    initial-instance-info-replication-interval-seconds: 10
    instance-info-replication-interval-seconds: 10
  instance:
    # ── Hostname advertised to Eureka ────────────────────────────────────────
    # On Render: RENDER_EXTERNAL_HOSTNAME is auto-injected (e.g., backend-nccx.onrender.com).
    # In Docker Compose: EUREKA_INSTANCE_HOSTNAME is set explicitly in docker-compose.yml
    #   to the Docker service name ("backend") so container-to-container calls resolve.
    # This two-variable approach avoids the Docker fallback resolving to a non-routable
    # spring.application.name string ("truthstream-gateway").
    hostname: ${RENDER_EXTERNAL_HOSTNAME:${EUREKA_INSTANCE_HOSTNAME:localhost}}
    # Always use the hostname, never resolved IP (Render routes by hostname).
    prefer-ip-address: false
    # Render terminates TLS externally — the app itself speaks HTTP internally.
    non-secure-port-enabled: true
    secure-port-enabled: false
    # ── Heartbeat / lease tuning for Render free tier ───────────────────────
    # Heartbeat sent every 30s (default). Eureka server keeps instance alive
    # if a heartbeat arrives within lease-expiration-duration-in-seconds.
    lease-renewal-interval-in-seconds: 30
    # If no heartbeat arrives within 90s, Eureka considers the instance DOWN.
    # 3x the renewal interval is the recommended ratio.
    lease-expiration-duration-in-seconds: 90
    # Health check URL Eureka calls to confirm UP status.
    health-check-url-path: /actuator/health
    status-page-url-path: /actuator/info
    # Metadata visible in the Eureka dashboard under instance details.
    metadata-map:
      service-type: gateway
      version: "1.0"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.truthstream:               DEBUG
    org.springframework.security:  INFO
    org.springframework.web:       INFO
    com.zaxxer.hikari:             WARN
    # Eureka registration diagnostics — set to DEBUG to trace 404 issues.
    # Shows: registration attempts, heartbeat cycles, registry refresh.
    com.netflix.discovery:         INFO
    com.netflix.eureka:            WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
